<mat-card>
        <mat-card-header>
            <mat-card-title>Dados para Acesso</mat-card-title>
        </mat-card-header>
        <form [(formGroup)]="formLogin" (ngSubmit)="onLogin()">            
        <mat-card-content>            
            <div class="form-row">

                <div class="col-md-12">
                    <mat-form-field appearance="outline" class="col-md-6">
                        <mat-label>Email</mat-label>
                        <input matInput placeholder="Email" formControlName="cEmail" type="email" ngModel email id="email">
                        <mat-error class="text-right" *ngIf="isSubmitted && formControls.cEmail?.errors?.required">Você deve digitar um email</mat-error>
                        <mat-error class="text-right" *ngIf="isSubmitted && formControls.cEmail?.errors?.email">O Email digitado deve ser válido</mat-error>
                        <mat-icon matSuffix>drafts</mat-icon>
                    </mat-form-field>
                </div>

                <div class="col-md-12">
                    <mat-form-field appearance="outline" class="pass-bar col-md-6">
                        <mat-label>Senha</mat-label>
                        <input matInput formControlName="cSenha" placeholder="Senha" [type]="hide ? 'password' : 'text'" [(ngModel)]="cSenha" id="senha">
                        <mat-icon matSuffix (click)="hide = !hide"> {{hide ? 'visibility_off' : 'visibility'}} </mat-icon>
                        <mat-error class="text-right" *ngIf="isSubmitted && formControls.cSenha?.errors?.required">Você deve digitar uma senha</mat-error>
                        <mat-error class="text-right" *ngIf="isSubmitted && formControls.cSenha?.errors?.minlength">Você deve digitar uma senha com o mínimo {{digitosSenha}} dígitos</mat-error>    
                    </mat-form-field>
                </div>

            </div>
         
        </mat-card-content>
        <div class="col-md-12">
        <mat-card-actions>
              
            <button mat-button  type="submit"  class="btn btn-success active" [promiseBtn]="submitPromise">Acessar</button>  
            
        </mat-card-actions>
    </div>  
    </form>
    </mat-card>
